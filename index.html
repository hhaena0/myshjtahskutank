<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>명탐정 코난 정주행 트래커</title>
  <meta name="description" content="명탐정 코난 시청 트래커 및 다이어리" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="코난 정주행 트래커" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- ── 로딩 화면 ── -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-icon">🔍</div>
      <h2>명탐정 코난 정주행 트래커</h2>
      <p id="loading-text">에피소드 데이터 불러오는 중...</p>
      <div class="loading-bar">
        <div id="loading-progress-fill" class="loading-bar-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- ── 앱 본체 ── -->
  <div id="app" class="app-container">

    <!-- 헤더 -->
    <header class="app-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-icon">🔍</span>
          <div>
            <h1>명탐정 코난</h1>
            <p class="header-sub">정주행 트래커</p>
          </div>
        </div>
      </div>

      <!-- 진행률 -->
      <div class="progress-section">
        <div class="progress-header">
          <span id="stat-watched">0화 완료</span>
          <span id="progress-percent">0%</span>
          <span id="stat-bookmarked">북마크 0개</span>
        </div>
        <div class="progress-bar">
          <div id="progress-bar-fill" class="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-counts">
          <span id="progress-count">0</span> / <span id="progress-total">0</span>화
        </div>
      </div>
    </header>

    <!-- 시즌 선택기 -->
    <div class="season-selector-wrapper">
      <div id="season-selector" class="season-selector"></div>
    </div>

    <!-- 현재 시즌 정보 -->
    <div class="current-season-banner">
      <span id="current-season-info">전체 시즌</span>
      <span id="episode-count" class="ep-count-badge">0화</span>
    </div>

    <!-- 검색 + 필터 -->
    <div class="controls-section">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input id="search-input" type="search" placeholder="제목 검색..." autocomplete="off" spellcheck="false" />
      </div>

      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="unwatched">미시청</button>
        <button class="filter-btn" data-filter="watched">시청 완료</button>
        <button class="filter-btn" data-filter="bookmarked">북마크</button>
        <button class="filter-btn" data-filter="memo">✏️ 메모</button>
      </div>

      <div class="tag-filter-area">
        <div id="tag-filter-scroll" class="tag-filter-scroll"></div>
      </div>
    </div>

    <!-- 에피소드 목록 -->
    <main id="episodes-list" class="episodes-list">
      <!-- JS로 렌더링 -->
    </main>

  </div>

  <!-- ── 모달 ── -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button id="modal-close-btn" class="modal-close-btn" title="닫기">✕</button>

      <div class="modal-body">
        <div class="modal-ep-header">
          <span id="modal-ep-num" class="modal-ep-num"></span>
          <span id="modal-ep-date" class="modal-ep-date"></span>
        </div>
        <h2 id="modal-ep-title" class="modal-ep-title"></h2>

        <!-- 시청 버튼 -->
        <button id="modal-watch-btn" class="btn-primary">시청 완료로 표시</button>



        <!-- 태그 -->
        <div class="modal-section">
          <label class="modal-label">태그</label>
          <div id="modal-current-tags" class="current-tags-row"></div>
          <div class="quick-tags-row">
            <button class="quick-tag-btn tag tag-org" data-tag="검은조직">검은조직</button>
            <button class="quick-tag-btn tag tag-kid" data-tag="괴도키드">괴도키드</button>
            <button class="quick-tag-btn tag tag-detective" data-tag="어린이탐정단">어린이탐정단</button>
            <button class="quick-tag-btn tag tag-shinichi" data-tag="쿠도 신이치">쿠도 신이치</button>
            <button class="quick-tag-btn tag tag-heiji" data-tag="핫토리 헤이지">핫토리 헤이지</button>
            <button class="quick-tag-btn tag tag-akai" data-tag="아카이 슈이치">아카이 슈이치</button>
          </div>
        </div>

        <!-- 메모 -->
        <div class="modal-section">
          <label class="modal-label">메모</label>
          <textarea id="modal-memo" class="modal-memo" placeholder="이 에피소드에 대한 메모..."></textarea>
        </div>

        <button id="modal-save-btn" class="btn-secondary">저장하고 닫기</button>
      </div>
    </div>
  </div>

  <!-- ── 토스트 ── -->
  <div id="toast" class="toast"></div>

  <!-- ── 맨 위로 버튼 ── -->
  <button id="scroll-top-btn" class="scroll-top-btn" title="맨 위로">↑</button>

  <script type="module" src="js/app.js"></script>
</body>

</html>
